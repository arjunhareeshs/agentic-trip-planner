# ══════════════════════════════════════════════════════════════
# Dual-Modal RAG Pipeline — Default Configuration
#
# RULES:
#   • This file is the SINGLE SOURCE OF TRUTH for all parameters.
#   • Change values here — NEVER hardcode in Python files.
#   • Environment variables prefixed RAG_ override these values.
#     (e.g. RAG_DEVICE=cuda overrides the device field below)
#   • All paths are relative to the RAG package root directory.
# ══════════════════════════════════════════════════════════════

# ── Model configuration ───────────────────────────────────────
models:
  text_embedding:
    name: "BAAI/bge-base-en-v1.5"
    dimension: 768
    local_path: "./models/bge-base-en-v1.5"
    max_seq_length: 512
    batch_size: 32
    normalize: true

  image_embedding:
    name: "openai/clip-vit-base-patch32"
    dimension: 512
    local_path: "./models/clip-vit-b-32"
    image_size: 224

  cross_encoder:
    name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    local_path: "./models/cross-encoder"
    max_seq_length: 512

# ── Chunking configuration ────────────────────────────────────
chunking:
  strategy: "structure_aware"
  max_chunk_tokens: 512
  overlap_tokens: 50
  min_chunk_tokens: 30           # chunks smaller than this are merged with next
  respect_elements:
    - heading
    - table
    - list
    - image_caption
    - pricing_block
    - paragraph
  standalone_elements:           # these NEVER get split, keep as-is
    - table
    - list
    - pricing_block
    - image_caption

# ── Retrieval configuration ────────────────────────────────────
retrieval:
  text_top_k: 15
  image_top_k: 10
  caption_top_k: 10
  rerank_top_k: 5
  context_token_budget: 4096     # max tokens in final assembled context

# ── Metadata extraction keywords ─────────────────────────────
metadata:
  cities:
    - udaipur
    - jaipur
    - goa
    - mumbai
    - delhi
    - agra
    - varanasi
    - kerala
    - manali
    - shimla

  scene_types:
    lake: [lake, reservoir, river, water, palace on water]
    mountain: [mountain, hill, peak, valley, glacier, trek]
    market: [market, bazaar, shopping, souq, mall]
    temple: [temple, shrine, mandir, mosque, church, heritage]
    beach: [beach, sea, ocean, shore, coast, bay]
    forest: [forest, jungle, wildlife, national park, safari]
    desert: [desert, dune, sand]
    city: [city, town, urban, street, square, landmark]

  crowd_level_keywords:
    low: [quiet, peaceful, serene, empty, crowd free, uncrowded, secluded]
    medium: [some crowds, moderate, busy periods, some tourists]
    high: [crowded, busy, packed, popular, tourist hotspot]

  lighting_keywords:
    sunrise: [sunrise, dawn, morning light, early morning]
    sunset: [sunset, dusk, golden hour, evening glow]
    night: [night, nighttime, illuminated, lit up, evening]
    daylight: [daylight, afternoon, midday, clear sky, bright]

  emotion_keywords:
    calm: [peaceful, serene, tranquil, relaxing, quiet, meditation]
    romantic: [romantic, intimate, couple, love, honeymoon]
    adventurous: [adventure, trek, hike, climb, explore, thrill]
    spiritual: [spiritual, devotion, prayer, pilgrimage, sacred]
    joyful: [fun, exciting, vibrant, festive, celebration]
    family: [family, children, kids, all ages]

# ── Index persistence ─────────────────────────────────────────
indexing:
  persist_dir: "../vectordb"            # server/src/vectordb/
  text_index_name: "text_index"
  image_index_name: "image_index"
  caption_index_name: "caption_index"
  image_cache_dir: "../vectordb/image_cache"
  auto_persist: true             # persist index after every build/add

# ── Query routing ─────────────────────────────────────────────
routing:
  default_engine: "hybrid"       # text | image | hybrid
  use_subquestion: true          # decompose complex queries
  use_tree_index: true           # for summarization queries
  subquestion_llm: "ollama/deepseek-v3.1:671b-cloud"      # LLM for subquestion decomposition

# ── Hardware ──────────────────────────────────────────────────
device: "auto"    # auto | cpu | cuda | mps
                  # auto = cuda > mps > cpu

# ── Logging ───────────────────────────────────────────────────
log_level: "INFO"    # DEBUG | INFO | WARNING | ERROR
log_timing: true     # log stage timing metrics

# ── Parsing ───────────────────────────────────────────────────
parsing:
  docling_preserve_tables: true
  docling_preserve_images: true
  docling_layout_analysis: true
  min_image_width_px: 100        # ignore tiny/icon images
  min_image_height_px: 100
  supported_formats: [".pdf"]
